spring.application.name=flight-route-api

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:33055/flight_route}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:phoenixsqluser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:phoenixsqluser}

app.security.jwt.secret=${JWT_SECRET:change-me-please-use-a-strong-256-bit-secret-in-prod}
app.security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

app.security.headers.content-security-policy=${SECURITY_CSP:default-src 'self'; frame-ancestors 'self'; object-src 'none'; img-src 'self' data:; font-src 'self' data:}

app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3001}
app.security.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:}

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.probes.enabled=true

app.cache.routes.ttl=${APP_CACHE_ROUTES_TTL:PT1H}
app.cache.routes.max-size=${APP_CACHE_ROUTES_MAX_SIZE:10000}
